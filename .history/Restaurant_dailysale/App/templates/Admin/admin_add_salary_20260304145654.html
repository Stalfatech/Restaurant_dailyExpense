{% extends "base.html" %}
{% load static %}
{% block 'content' %}

<style>
    .premium-card {
        border-radius: 16px;
    }

    .form-label {
        font-size: 13px;
        font-weight: 600;
        color: #495057;
        margin-bottom: 6px;
    }

    .form-control,
    .form-select {
        border-radius: 10px;
        height: 44px;
        font-size: 14px;
    }

    .form-control[readonly] {
        background-color: #f8f9fa;
    }

    .highlight-box {
        background: #f8f9fa;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
        font-size: 15px;
    }

    .btn-primary {
        border-radius: 50px;
        padding: 8px 24px;
        font-size: 14px;
        font-weight: 500;
    }
</style>

<div class="container py-4">

<div class="card premium-card shadow-sm border-0">

    <!-- Header -->
    <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
        <div>
            <h5 class="mb-0 fw-bold">
                <i class="bi bi-cash-stack text-primary me-2"></i>
                Add Salary
            </h5>
            <small class="text-muted">
                Create and manage staff salary details
            </small>
        </div>

        <a href="{% url 'admin_salary_list' %}" 
           class="btn btn-outline-secondary btn-sm rounded-pill px-3">
            ← Back
        </a>
    </div>

    <div class="card-body p-4">

        <form method="POST">
            {% csrf_token %}

            <div class="row g-4">

                <!-- Staff -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-person text-primary me-1"></i>
                        Staff Name *
                    </label>
                    <select name="staff" id="staff_select" class="form-select" required>
                        <option value="">Select Staff</option>
                        {% for staff in staffs %}
                            <option value="{{ staff.id }}" 
                                    data-salary-type="{{ staff.salary_type }}">
                                {{ staff.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Salary Type -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-cash-coin text-success me-1"></i>
                        Salary Type
                    </label>
                    <input type="text" id="salary_type_display"
                           class="form-control"
                           readonly>
                </div>

                <!-- Month -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar-event text-warning me-1"></i>
                        Salary Month *
                    </label>
                    <select name="salary_month" id="salary_month"
                            class="form-select" required>
                        <option value="">Select Month</option>
                        {% for m,v in month_choices %}
                            <option value="{{ m }}">{{ v }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Year -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar text-primary me-1"></i>
                        Salary Year *
                    </label>
                    <select name="salary_year" id="salary_year"
                            class="form-select" required>
                        <option value="">Select Year</option>
                        {% for year in years %}
                            <option value="{{ year }}"
                                {% if year == current_year %}selected{% endif %}>
                                {{ year }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Salary Amount -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-currency-dollar text-success me-1"></i>
                        Salary Amount *
                    </label>
                    <input type="number" step="0.01"
                           name="salary_amount"
                           id="salary_amount"
                           class="form-control"
                           required>
                </div>

                <!-- Paid Amount -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-wallet2 text-info me-1"></i>
                        Paid Amount
                    </label>
                    <input type="number" step="0.01"
                           name="paid_amount"
                           id="paid_amount"
                           value="0"
                           class="form-control">
                </div>

                <!-- Need Advance -->
                <div class="col-md-6">
                    <label class="form-label">
                        Need advance of this month?
                    </label>
                    <select name="need_advance"
                            id="needAdvance"
                            class="form-select"
                            onchange="toggleAdvanceField()">
                        <option value="no" selected>No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>

                <!-- Salary Advance -->
                <div class="col-md-6 d-none" id="advanceField">
                    <label class="form-label">
                        Salary Advance
                    </label>
                    <input type="number" step="0.01"
                           name="salary_advance"
                           id="salary_advance"
                           value="0"
                           class="form-control">
                </div>

                <!-- Need Next Month Advance -->
                <div class="col-md-6">
                    <label class="form-label">
                        Need Next Month Advance?
                    </label>
                    <select id="needNextAdvance"
                            class="form-select"
                            onchange="toggleNextMonthAdvance()">
                        <option value="no" selected>No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>

                <!-- Next Month Advance -->
                <div class="col-md-6 d-none" id="nextMonthAdvanceField">
                    <label class="form-label">
                        Next Month Advance Salary
                    </label>
                    <input type="number" step="0.01"
                           name="next_month_advance"
                           id="next_month_advance"
                           value="0"
                           class="form-control">
                </div>

                <!-- Payment Date -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar-check text-primary me-1"></i>
                        Payment Date *
                    </label>
                    <input type="date"
                           name="payment_date"
                           class="form-control"
                           required>
                </div>

                <!-- Payment Mode -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-credit-card text-dark me-1"></i>
                        Payment Mode *
                    </label>
                    <select name="payment_mode"
                            class="form-select"
                            required>
                        <option value="">Select Mode</option>
                        <option value="Cash">Cash</option>
                        <option value="Bank">Bank</option>
                    </select>
                </div>

                <!-- Financial Preview Section -->
                <div class="col-12 mt-3">
                    <div class="highlight-box">
                        Financial Summary
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="form-label">
                        Balance (Preview)
                    </label>
                    <input type="text"
                           id="balance_preview"
                           name="balance_preview"
                           class="form-control"
                           readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">
                        Previous Month Balance
                    </label>
                    <input type="text"
                           id="previous_balance"
                           class="form-control"
                           readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label">
                        Already Bought Next Month Advance
                    </label>
                    <input type="text"
                           id="previous_next_month_advance"
                           class="form-control"
                           readonly>
                </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end mt-4">
                <button type="submit" 
                        class="btn btn-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-save me-1"></i> Save Salary
                </button>
            </div>

        </form>

    </div>
</div>
</div>

{% endblock %}
