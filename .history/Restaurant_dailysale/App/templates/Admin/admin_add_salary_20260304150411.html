{% extends "base.html" %}
{% load static %}
{% block 'content' %}

<div class="container py-4">

    <div class="card border-0 shadow-sm rounded-4">

        <!-- Header -->
        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
            <div>
                <h5 class="mb-0 fw-bold">
                    <i class="bi bi-cash-stack me-2 text-primary"></i>
                    Add Salary
                </h5>
                <small class="text-muted">Create a new salary entry</small>
            </div>

            <a href="{% url 'admin_salary_list' %}" 
               class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                ← Back
            </a>
        </div>

        <div class="card-body p-4">

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="row g-3">

                    <!-- Staff -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-person me-1 text-primary"></i>
                            Staff Name *
                        </label>
                        <select name="staff" id="staff_select" class="form-select" required>
                            <option value="">Select Staff</option>
                            {% for staff in staffs %}
                                <option value="{{ staff.id }}" 
                                        data-salary-type="{{ staff.salary_type }}">
                                    {{ staff.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Salary Type -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-briefcase me-1 text-success"></i>
                            Salary Type
                        </label>
                        <input type="text" id="salary_type_display"
                               class="form-control bg-light" readonly>
                    </div>

                    <!-- Salary Month -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-calendar-event me-1 text-warning"></i>
                            Salary Month *
                        </label>
                        <select name="salary_month" id="salary_month"
                                class="form-select" required>
                            <option value="">Select Month</option>
                            {% for m,v in month_choices %}
                                <option value="{{ m }}">{{ v }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Salary Year -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-calendar me-1 text-primary"></i>
                            Salary Year *
                        </label>
                        <select name="salary_year" id="salary_year"
                                class="form-select" required>
                            <option value="">Select Year</option>
                            {% for year in years %}
                                <option value="{{ year }}"
                                    {% if year == current_year %}selected{% endif %}>
                                    {{ year }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Salary Amount -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-currency-dollar me-1 text-success"></i>
                            Salary Amount *
                        </label>
                        <input type="number" step="0.01"
                               name="salary_amount"
                               id="salary_amount"
                               class="form-control"
                               required>
                    </div>

                    <!-- Need Advance -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-wallet2 me-1 text-danger"></i>
                            Need Advance This Month?
                        </label>
                        <select name="need_advance"
                                id="needAdvance"
                                class="form-select"
                                onchange="toggleAdvanceField()">
                            <option value="no" selected>No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>

                    <!-- Salary Advance -->
                    <div class="col-md-6 d-none" id="advanceField">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-cash me-1 text-danger"></i>
                            Salary Advance
                        </label>
                        <input type="number" step="0.01"
                               name="salary_advance"
                               id="salary_advance"
                               value="0"
                               class="form-control">
                    </div>

                    <!-- Paid Amount -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-credit-card me-1 text-info"></i>
                            Paid Amount
                        </label>
                        <input type="number" step="0.01"
                               name="paid_amount"
                               id="paid_amount"
                               value="0"
                               class="form-control">
                    </div>

                    <!-- Payment Date -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-calendar-check me-1 text-primary"></i>
                            Payment Date *
                        </label>
                        <input type="date"
                               name="payment_date"
                               class="form-control"
                               required>
                    </div>

                    <!-- Payment Mode -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-bank me-1 text-dark"></i>
                            Payment Mode *
                        </label>
                        <select name="payment_mode"
                                class="form-select"
                                required>
                            <option value="">Select Mode</option>
                            <option value="Cash">Cash</option>
                            <option value="Bank">Bank</option>
                        </select>
                    </div>

                    <!-- Need Next Month Advance -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-arrow-right-circle me-1 text-warning"></i>
                            Need Next Month Advance?
                        </label>
                        <select id="needNextAdvance"
                                class="form-select"
                                onchange="toggleNextMonthAdvance()">
                            <option value="no" selected>No</option>
                            <option value="yes">Yes</option>
                        </select>
                    </div>

                    <!-- Next Month Advance -->
                    <div class="col-md-6 d-none" id="nextMonthAdvanceField">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-arrow-repeat me-1 text-warning"></i>
                            Next Month Advance Salary
                        </label>
                        <input type="number" step="0.01"
                               name="next_month_advance"
                               id="next_month_advance"
                               value="0"
                               class="form-control">
                    </div>

                    <!-- Balance Preview -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-calculator me-1 text-success"></i>
                            Balance (Preview)
                        </label>
                        <input type="text"
                               id="balance_preview"
                               name="balance_preview"
                               class="form-control bg-light"
                               readonly>
                    </div>

                    <!-- Previous Month Balance -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-clock-history me-1 text-secondary"></i>
                            Previous Month Balance
                        </label>
                        <input type="text"
                               id="previous_balance"
                               class="form-control bg-light"
                               readonly>
                    </div>

                    <!-- Already Bought Next Month Advance -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-arrow-down-up me-1 text-danger"></i>
                            Already Bought Next Month Advance
                        </label>
                        <input type="text"
                               id="previous_next_month_advance"
                               class="form-control bg-light"
                               readonly>
                    </div>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="submit" 
                            class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-save me-1"></i> Save Salary
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- ===============================
     JAVASCRIPT (Logic Preserved)
================================= -->

<script>
document.addEventListener("DOMContentLoaded", function () {

    const salaryInput    = document.getElementById("salary_amount");
    const balancePreview = document.getElementById("balance_preview");

    const staffSelect       = document.getElementById("staff_select");
    const salaryTypeDisplay = document.getElementById("salary_type_display");
    const monthSelect       = document.getElementById("salary_month");
    const yearSelect        = document.getElementById("salary_year");

    const prevMonthSalaryEl = document.getElementById("previous_balance");
    const advanceTokenEl    = document.getElementById("previous_next_month_advance");

    const advanceInput     = document.getElementById("salary_advance");
    const nextMonthAdvance = document.getElementById("next_month_advance");
    const paidInput        = document.getElementById("paid_amount");

    function calculateBalance() {
        const currentSalary  = parseFloat(salaryInput.value) || 0;
        const previousSalary = parseFloat(prevMonthSalaryEl.value) || 0;
        const advanceToken   = parseFloat(advanceTokenEl.value) || 0;
        const paidAmount     = parseFloat(paidInput.value) || 0;

        let finalBalance = (currentSalary + previousSalary) - paidAmount - advanceToken;
        if (finalBalance < 0) finalBalance = 0;

        balancePreview.value = finalBalance.toFixed(2);
    }

    function fetchPreviousSalaryData() {
        const staff_id = staffSelect.value;
        const month    = monthSelect.value;
        const year     = yearSelect.value;
        const salary   = salaryInput.value || 0;
        const paid     = paidInput.value || 0;

        if (!staff_id || !month || !year) return;

        fetch(`/get_previous_salary_data/?staff_id=${staff_id}&salary_month=${month}&salary_year=${year}&salary_amount=${salary}&paid_amount=${paid}`)
            .then(r => r.json())
            .then(data => {
                prevMonthSalaryEl.value = data.previous_month_salary ?? "0.00";
                advanceTokenEl.value    = data.advance_token ?? "0.00";
                balancePreview.value    = data.balance_preview ?? "0.00";
            })
            .catch(err => console.error(err));
    }

    salaryInput.addEventListener("input", calculateBalance);
    paidInput.addEventListener("input", calculateBalance);
    advanceInput.addEventListener("input", calculateBalance);
    nextMonthAdvance.addEventListener("input", calculateBalance);

    [staffSelect, monthSelect, yearSelect].forEach(el => {
        if (el) el.addEventListener("change", fetchPreviousSalaryData);
    });

    staffSelect.addEventListener("change", function () {
        const selected = this.options[this.selectedIndex];
        salaryTypeDisplay.value = selected.getAttribute("data-salary-type") || "";
        fetchPreviousSalaryData();
    });

    window.toggleAdvanceField = function() {
        const dropdown = document.getElementById("needAdvance");
        const field = document.getElementById("advanceField");
        if (dropdown.value === "yes") {
            field.classList.remove("d-none");
            advanceInput.focus();
        } else {
            field.classList.add("d-none");
            advanceInput.value = 0;
            calculateBalance();
        }
    };

    window.toggleNextMonthAdvance = function() {
        const dropdown = document.getElementById("needNextAdvance");
        const field = document.getElementById("nextMonthAdvanceField");
        if (dropdown.value === "yes") {
            field.classList.remove("d-none");
            nextMonthAdvance.focus();
        } else {
            field.classList.add("d-none");
            nextMonthAdvance.value = 0;
            calculateBalance();
        }
    };

    fetchPreviousSalaryData();
    calculateBalance();
});
</script>

{% endblock %}
