\\{% extends "base.html" %}
{% block 'content' %}

<style>
    .premium-card {
        border-radius: 16px;
    }

    .form-label {
        font-size: 13px;
        font-weight: 600;
        color: #495057;
        margin-bottom: 6px;
    }

    .form-control,
    .form-select {
        border-radius: 10px;
        height: 44px;
        font-size: 14px;
    }

    textarea.form-control {
        height: auto;
        min-height: 100px;
    }

    .btn-primary {
        border-radius: 50px;
        padding: 8px 22px;
        font-size: 14px;
        font-weight: 500;
    }
</style>

<div class="container py-4">

<div class="card premium-card shadow-sm border-0">

    <!-- Header -->
    <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
        <div>
            <h5 class="mb-0 fw-bold">
                <i class="bi bi-person-lines-fill text-primary me-2"></i>
                Edit Staff
            </h5>
            <small class="text-muted">Update staff member details</small>
        </div>

        <a href="{% url 'adminview_staff' %}" 
           class="btn btn-outline-secondary btn-sm rounded-pill px-3">
            ← Back
        </a>
    </div>

    <div class="card-body p-4">

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm rounded-3">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="row g-4">

                <!-- Staff ID -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-hash text-secondary me-1"></i>
                        Staff ID *
                    </label>
                    <input type="text"
                           name="staff_id"
                           value="{{ form_data.staff_id|default:staff.staff_id }}"
                           class="form-control"
                           required>
                </div>

                <!-- Name -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-person text-primary me-1"></i>
                        Name *
                    </label>
                    <input type="text"
                           name="name"
                           value="{{ form_data.name|default:staff.name }}"
                           class="form-control"
                           required>
                </div>

                <!-- Gender -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-gender-ambiguous text-info me-1"></i>
                        Gender *
                    </label>
                    <select name="gender" class="form-select" required>
                        <option value="">Select Gender</option>
                        <option value="Male"
                            {% if form_data.gender|default:staff.gender == "Male" %}selected{% endif %}>
                            Male
                        </option>
                        <option value="Female"
                            {% if form_data.gender|default:staff.gender == "Female" %}selected{% endif %}>
                            Female
                        </option>
                        <option value="Other"
                            {% if form_data.gender|default:staff.gender == "Other" %}selected{% endif %}>
                            Other
                        </option>
                    </select>
                </div>

                <!-- Role -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-briefcase text-warning me-1"></i>
                        Role *
                    </label>
                    <select name="role" class="form-select" required>
                        <option value="">Select Role</option>
                        <option value="Chef"
                            {% if form_data.role|default:staff.role == "Chef" %}selected{% endif %}>
                            Chef
                        </option>
                        <option value="Helper"
                            {% if form_data.role|default:staff.role == "Helper" %}selected{% endif %}>
                            Helper
                        </option>
                        <option value="Delivery"
                            {% if form_data.role|default:staff.role == "Delivery" %}selected{% endif %}>
                            Delivery
                        </option>
                    </select>
                </div>

                <!-- Manager -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-person-gear text-success me-1"></i>
                        Manager *
                    </label>
                    <select name="manager" class="form-select" required>
                        <option value="">Select Manager</option>
                        {% for m in managers %}
                            <option value="{{ m.id }}"
                                {% if form_data.manager %}
                                    {% if form_data.manager == m.id|stringformat:"s" %}selected{% endif %}
                                {% else %}
                                    {% if staff.branch.id == m.user.branch.id %}selected{% endif %}
                                {% endif %}>
                                {{ m.user.name }} ({{ m.user.branch.name }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Contact -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-telephone text-success me-1"></i>
                        Contact Number *
                    </label>
                    <input type="tel"
                           name="contact"
                           value="{{ form_data.contact|default:staff.contact }}"
                           class="form-control {% if contact_error %}is-invalid{% endif %}"
                           placeholder="+971501234567"
                           required>

                    {% if contact_error %}
                        <div class="invalid-feedback">
                            {{ contact_error }}
                        </div>
                    {% endif %}
                </div>

                <!-- DOB -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar-date text-warning me-1"></i>
                        Date of Birth
                    </label>
                    <input type="date"
                           name="dob"
                           value="{% if form_data.dob %}{{ form_data.dob }}{% elif staff.dob %}{{ staff.dob|date:'Y-m-d' }}{% endif %}"
                           class="form-control"
                           max="{% now 'Y-m-d' %}">
                </div>

                <!-- Joining Date -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar-check text-primary me-1"></i>
                        Joining Date *
                    </label>
                    <input type="date"
                           name="joining_date"
                           value="{% if form_data.joining_date %}{{ form_data.joining_date }}{% else %}{{ staff.joining_date|date:'Y-m-d' }}{% endif %}"
                           class="form-control"
                           required>
                </div>

                <!-- Salary Type -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-cash-coin text-success me-1"></i>
                        Salary Type *
                    </label>
                    <select name="salary_type" class="form-select" required>
                        <option value="">Select Salary Type</option>
                        <option value="Daily"
                            {% if form_data.salary_type|default:staff.salary_type == "Daily" %}selected{% endif %}>
                            Daily
                        </option>
                        <option value="Monthly"
                            {% if form_data.salary_type|default:staff.salary_type == "Monthly" %}selected{% endif %}>
                            Monthly
                        </option>
                    </select>
                </div>

                <!-- Status -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-toggle-on text-primary me-1"></i>
                        Status *
                    </label>
                    <select name="status" class="form-select" required>
                        <option value="">Select Status</option>
                        <option value="Active"
                            {% if form_data.status|default:staff.status == "Active" %}selected{% endif %}>
                            Active
                        </option>
                        <option value="Inactive"
                            {% if form_data.status|default:staff.status == "Inactive" %}selected{% endif %}>
                            Inactive
                        </option>
                    </select>
                </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end mt-4">
                <button type="submit" 
                        class="btn btn-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-save me-1"></i> Update Staff
                </button>
            </div>

        </form>

    </div>
</div>
</div>

{% endblock %}
