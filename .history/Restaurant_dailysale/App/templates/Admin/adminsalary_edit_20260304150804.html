{% extends "base.html" %}
{% load static %}
{% block 'content' %}

<style>
    .premium-card {
        border-radius: 18px;
    }

    .form-label {
        font-size: 13px;
        font-weight: 600;
        color: #495057;
        margin-bottom: 6px;
    }

    .form-control,
    .form-select {
        border-radius: 10px;
        height: 44px;
        font-size: 14px;
    }

    .form-control[readonly],
    .form-select:disabled {
        background-color: #f8f9fa;
    }

    .btn-success {
        border-radius: 50px;
        padding: 8px 22px;
        font-size: 14px;
        font-weight: 500;
    }
</style>

<div class="container py-4">

<div class="card premium-card border-0 shadow-sm">

    <!-- Header -->
    <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center p-4">

        <div>
            <h5 class="mb-0 fw-bold">
                <i class="bi bi-pencil-square text-primary me-2"></i>
                Edit Salary
            </h5>
            <small class="text-muted">
                Update and manage salary payment details
            </small>
        </div>

        <a href="{% url 'admin_salary_list' %}" 
           class="btn btn-outline-secondary btn-sm rounded-pill px-3">
            <i class="bi bi-arrow-left me-1"></i> Back
        </a>

    </div>

    <div class="card-body p-4">

        <form method="POST">
            {% csrf_token %}

            <div class="row g-4">

                <!-- Staff -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-person text-primary me-1"></i>
                        Staff
                    </label>
                    <select class="form-select" disabled>
                        <option>{{ salary.staff.name }}</option>
                    </select>
                </div>

                <!-- Month -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar-event text-warning me-1"></i>
                        Month
                    </label>
                    <input type="text" 
                           class="form-control"
                           value="{{ salary.salary_month }}" 
                           readonly>
                </div>

                <!-- Year -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar text-info me-1"></i>
                        Year
                    </label>
                    <input type="text" 
                           class="form-control"
                           value="{{ salary.salary_year }}" 
                           readonly>
                </div>

                <!-- Salary Amount -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-currency-dollar text-success me-1"></i>
                        Salary Amount
                    </label>
                    <input id="salary_amount"
                           type="number"
                           step="0.01"
                           name="salary_amount"
                           value="{{ salary.salary_amount }}"
                           class="form-control">
                </div>

                <!-- Advance -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-wallet2 text-danger me-1"></i>
                        Advance
                    </label>
                    <input id="advance_amount"
                           type="number"
                           step="0.01"
                           name="salary_advance"
                           value="{{ total_advance }}"
                           class="form-control"
                           readonly>
                </div>

                <!-- Already Paid -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-credit-card text-primary me-1"></i>
                        Already Paid
                    </label>
                    <input id="already_paid"
                           type="number"
                           class="form-control"
                           value="{{ salary.paid_amount }}"
                           readonly>
                </div>

                <!-- Pay Now -->
                <div class="col-md-6">
                    <label for="pay_now" class="form-label">
                        <i class="bi bi-cash-stack text-success me-1"></i>
                        Pay Now
                    </label>
                    <input id="pay_now"
                           type="number"
                           step="0.01"
                           name="paid_amount"
                           class="form-control"
                           placeholder="Enter amount"
                           min="0">
                </div>

                <!-- Balance Preview -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calculator text-success me-1"></i>
                        Balance (Preview)
                    </label>
                    <input type="text"
                           id="balance_preview"
                           class="form-control"
                           value="{{ salary.balance_salary }}"
                           readonly>

                    <input type="hidden"
                           name="balance_salary"
                           id="balance_hidden"
                           value="{{ salary.balance_salary }}">
                </div>

                <!-- Payment Mode -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-bank text-dark me-1"></i>
                        Payment Mode
                    </label>
                    <select name="payment_mode" class="form-select">
                        <option value="Cash" 
                            {% if salary.payment_mode == "Cash" %}selected{% endif %}>
                            Cash
                        </option>
                        <option value="Bank" 
                            {% if salary.payment_mode == "Bank" %}selected{% endif %}>
                            Bank
                        </option>
                    </select>
                </div>

                <!-- Payment Date -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar-check text-primary me-1"></i>
                        Payment Date
                    </label>
                    <input type="date"
                           name="payment_date"
                           value="{{ salary.payment_date|date:'Y-m-d' }}"
                           class="form-control">
                </div>

                <!-- Next Month Advance -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-arrow-repeat text-warning me-1"></i>
                        Next Month Advance
                    </label>
                    <input type="number"
                           step="0.01"
                           name="next_month_advance"
                           class="form-control"
                           value="{{ salary.next_month_advance_amount }}">
                </div>

                <!-- Next Month -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar-plus text-secondary me-1"></i>
                        Next Month
                    </label>
                    <input type="text"
                           class="form-control"
                           value="{{ salary.next_month }}"
                           readonly>
                </div>

                <!-- Next Year -->
                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-calendar2-week text-secondary me-1"></i>
                        Next Year
                    </label>
                    <input type="text"
                           class="form-control"
                           value="{{ salary.next_month_year }}"
                           readonly>
                </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="submit" 
                        class="btn btn-success rounded-pill px-4 shadow-sm">
                    <i class="bi bi-check-circle me-1"></i>
                    Update Salary
                </button>
            </div>

        </form>

    </div>
</div>
</div>


<!-- ======================
     BALANCE SCRIPT
     (LOGIC UNCHANGED)
====================== -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const salaryInput = document.getElementById("salary_amount");
    const alreadyPaidInput = document.getElementById("already_paid");
    const payNowInput = document.getElementById("pay_now");
    const balancePreview = document.getElementById("balance_preview");
    const balanceHidden = document.getElementById("balance_hidden");

    function calculateBalance() {
        const salary = parseFloat(salaryInput.value) || 0;
        const alreadyPaid = parseFloat(alreadyPaidInput.value) || 0;
        const payNow = parseFloat(payNowInput.value) || 0;

        let balance = salary - (alreadyPaid + payNow);
        if (balance < 0) balance = 0;

        balancePreview.value = balance.toFixed(2);
        if (balanceHidden) balanceHidden.value = balance.toFixed(2);
    }

    payNowInput.addEventListener("input", calculateBalance);
    salaryInput.addEventListener("input", calculateBalance);
    alreadyPaidInput.addEventListener("input", calculateBalance);

    calculateBalance();
});
</script>

{% endblock %}
