{% extends "base.html" %}
{% load static %}
{% block 'content' %}

<style>
    .premium-card {
        border-radius: 16px;
    }

    .form-label {
        font-size: 13px;
        font-weight: 600;
        color: #495057;
    }

    .form-control,
    .form-select {
        border-radius: 10px;
        height: 44px;
    }
</style>

<div class="container py-4">

<div class="card premium-card shadow-sm border-0">

<!-- Header -->
<div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
    <div>
        <h5 class="mb-0 fw-bold">
            <i class="bi bi-pencil-square text-primary me-2"></i>
            Edit Manager Salary
        </h5>
        <small class="text-muted">Update manager salary payment details</small>
    </div>

    <a href="{% url 'manager_salary_list' %}" 
       class="btn btn-outline-secondary btn-sm rounded-pill px-3">
        ← Back
    </a>
</div>

<div class="card-body p-4">

<form method="POST">
{% csrf_token %}

<div class="row g-4">

<!-- Branch -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-diagram-3 me-1 text-muted"></i> Branch
    </label>
    <select name="branch" class="form-select">
        {% for b in branches %}
        <option value="{{ b.id }}" {% if salary.branch.id == b.id %}selected{% endif %}>
            {{ b.name }}
        </option>
        {% endfor %}
    </select>
</div>

<!-- Manager -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-person me-1 text-muted"></i> Manager
    </label>
    <select name="manager" class="form-select">
        {% for m in managers %}
        <option value="{{ m.id }}" {% if salary.manager.id == m.id %}selected{% endif %}>
            {{ m }}
        </option>
        {% endfor %}
    </select>
</div>

<!-- Month -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-calendar3 me-1 text-muted"></i> Month
    </label>
    <select name="salary_month" class="form-select">
        {% for m,v in month_choices %}
        <option value="{{ m }}" {% if salary.salary_month == m %}selected{% endif %}>
            {{ v }}
        </option>
        {% endfor %}
    </select>
</div>

<!-- Year -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-calendar-date me-1 text-muted"></i> Year
    </label>
    <select name="salary_year" class="form-select">
        {% for y in years %}
        <option value="{{ y }}" {% if salary.salary_year == y %}selected{% endif %}>
            {{ y }}
        </option>
        {% endfor %}
    </select>
</div>

<!-- Salary -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-currency-dollar me-1 text-muted"></i> Salary Amount
    </label>
    <input type="number" step="0.01" id="salary_amount"
           value="{{ salary.salary_amount }}" class="form-control bg-light" readonly>
</div>

<!-- Advance -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-cash-stack me-1 text-muted"></i> Advance
    </label>
    <input type="number" step="0.01" id="advance_amount"
           value="{{ salary.adjusted_advance }}" class="form-control bg-light" readonly>
</div>

<!-- Already Paid -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-wallet2 me-1 text-muted"></i> Already Paid
    </label>
    <input type="text" id="already_paid"
           value="{{ salary.paid_amount }}" class="form-control bg-light" readonly>
</div>

<!-- Pay Now -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-cash-coin me-1 text-muted"></i> Pay Now
    </label>
    <input type="number" step="0.01" name="pay_now" id="pay_now"
           class="form-control" placeholder="Enter amount">
</div>

<!-- Balance Preview -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-calculator me-1 text-muted"></i> Balance Preview
    </label>
    <input type="text" id="balance_preview" class="form-control bg-light" 
           value="{{ salary.balance_salary|default:'0.00' }}" readonly>
</div>

<!-- Payment Mode -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-credit-card me-1 text-muted"></i> Payment Mode
    </label>
    <select name="payment_mode" class="form-select">
        <option value="">Select</option>
        <option value="Cash" {% if salary.payment_mode == "Cash" %}selected{% endif %}>Cash</option>
        <option value="Bank" {% if salary.payment_mode == "Bank" %}selected{% endif %}>Bank</option>
    </select>
</div>

<!-- Payment Date -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-calendar-check me-1 text-muted"></i> Payment Date
    </label>
    <input type="date" name="payment_date"
           value="{{ salary.payment_date|date:'Y-m-d' }}"
           class="form-control">
</div>

<!-- Next Month Advance -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-arrow-right-circle me-1 text-muted"></i> Next Month Advance
    </label>
    <input type="number" step="0.01" name="next_month_advance"
           value="{{ salary.next_month_advance_amount }}" class="form-control">
</div>

<!-- Next Month -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-calendar-event me-1 text-muted"></i> Next Month
    </label>
    <select name="next_month" class="form-select">
        <option value="">Select Month</option>
        {% for m,v in month_choices %}
        <option value="{{ m }}" {% if salary.next_month == m %}selected{% endif %}>
            {{ v }}
        </option>
        {% endfor %}
    </select>
</div>

<!-- Next Year -->
<div class="col-md-6">
    <label class="form-label">
        <i class="bi bi-calendar2-week me-1 text-muted"></i> Next Year
    </label>
    <select name="next_month_year" class="form-select">
        <option value="">Select Year</option>
        {% for y in years %}
        <option value="{{ y }}" {% if salary.next_month_year == y %}selected{% endif %}>
            {{ y }}
        </option>
        {% endfor %}
    </select>
</div>

</div>

<!-- Buttons -->
<div class="d-flex justify-content-end gap-2 mt-4">
    <a href="{% url 'manager_salary_list' %}" 
       class="btn btn-outline-secondary rounded-pill px-4">
        Cancel
    </a>

    <button type="submit" 
            class="btn btn-success rounded-pill px-4">
        <i class="bi bi-save me-1"></i> Update Salary
    </button>
</div>

</form>

</div>
</div>
</div>

<script>
function calculateBalance(){
    let salary = parseFloat(document.getElementById("salary_amount").value) || 0;
    let advance = parseFloat(document.getElementById("advance_amount").value) || 0;
    let alreadyPaid = parseFloat(document.getElementById("already_paid").value) || 0;
    let payNow = parseFloat(document.getElementById("pay_now").value) || 0;

    let totalPaid = alreadyPaid + payNow;
    let balance = salary - advance - totalPaid;

    if(balance < 0){
        balance = 0;
    }

    document.getElementById("balance_preview").value = balance.toFixed(2);
}

document.getElementById("pay_now").addEventListener("input", calculateBalance);

window.addEventListener("load", function(){
    if(document.getElementById("pay_now").value){
        calculateBalance();
    }
});
</script>

{% endblock %}
