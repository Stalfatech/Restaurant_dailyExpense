{% extends "base.html" %}
{% load static %}
{% block 'content' %}

<style>
.premium-card{
    border-radius:16px;
}

.form-label{
    font-size:13px;
    font-weight:600;
    color:#495057;
    margin-bottom:6px;
}

.form-control,
.form-select{
    border-radius:10px;
    height:44px;
    font-size:14px;
}

.form-control[readonly]{
    background:#f8f9fa;
}

.btn-primary{
    border-radius:50px;
    padding:8px 22px;
    font-size:14px;
}
</style>


<div class="container py-4">

<div class="card premium-card shadow-sm border-0">

<!-- Header -->
<div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">

<div>
<h5 class="mb-0 fw-bold">
<i class="bi bi-cash-stack text-primary me-2"></i>
Add Salary
</h5>
<small class="text-muted">Create and manage staff salary details</small>
</div>

<a href="{% url 'salary_list' %}" 
class="btn btn-outline-secondary btn-sm rounded-pill px-3">
← Back
</a>

</div>


<div class="card-body p-4">

<p class="text-muted small mb-4">
Fields marked with <span class="text-danger">*</span> are mandatory.
</p>

<form method="POST">
{% csrf_token %}

<div class="row g-4">

<!-- Staff -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-person text-primary me-1"></i>
Staff Name *
</label>

<select name="staff" id="staff_select" class="form-select" required>
<option value="">Select Staff</option>

{% for staff in staffs %}
<option value="{{ staff.id }}" data-salary-type="{{ staff.salary_type }}">
{{ staff.name }}
</option>
{% endfor %}

</select>
</div>


<!-- Salary Type -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-briefcase text-success me-1"></i>
Salary Type
</label>

<input type="text"
id="salary_type_display"
class="form-control"
readonly>

</div>


<!-- Month -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-calendar-event text-warning me-1"></i>
Salary Month *
</label>

<select name="salary_month" id="salary_month" class="form-select" required>

<option value="">Select Month</option>

{% for m,v in month_choices %}
<option value="{{ m }}">{{ v }}</option>
{% endfor %}

</select>

</div>


<!-- Year -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-calendar text-primary me-1"></i>
Salary Year *
</label>

<select name="salary_year" id="salary_year" class="form-select" required>

<option value="">Select Year</option>

{% for year in years %}
<option value="{{ year }}" {% if year == current_year %}selected{% endif %}>
{{ year }}
</option>
{% endfor %}

</select>

</div>


<!-- Salary Amount -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-currency-dollar text-success me-1"></i>
Salary Amount *
</label>

<input type="number"
step="0.01"
name="salary_amount"
id="salary_amount"
class="form-control"
required>

</div>




<!-- Need Advance -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-wallet2 text-danger me-1"></i>
Need Advance This Month?
</label>

<select name="need_advance"
id="needAdvance"
class="form-select"
onchange="toggleAdvanceField()">

<option value="no" selected>No</option>
<option value="yes">Yes</option>

</select>

</div>


<!-- Advance -->
<div class="col-md-6 d-none" id="advanceField">

<label class="form-label">
<i class="bi bi-cash text-danger me-1"></i>
Salary Advance
</label>

<input type="number"
step="0.01"
name="salary_advance"
id="salary_advance"
value="0"
class="form-control">

</div>


<!-- Payment Date -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-calendar-check text-primary me-1"></i>
Payment Date *
</label>

<input type="date"
name="payment_date"
class="form-control"
required>

</div>


<!-- Payment Mode -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-bank text-dark me-1"></i>
Payment Mode *
</label>

<select name="payment_mode"
class="form-select"
required>

<option value="">Select Mode</option>
<option value="Cash">Cash</option>
<option value="Bank">Bank</option>

</select>

</div>


<!-- Next Month Advance -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-arrow-right-circle text-warning me-1"></i>
Need Next Month Advance?
</label>

<select id="needNextAdvance"
class="form-select"
onchange="toggleNextMonthAdvance()">

<option value="no" selected>No</option>
<option value="yes">Yes</option>

</select>

</div>


<div class="col-md-6 d-none" id="nextMonthAdvanceField">

<label class="form-label">
<i class="bi bi-arrow-repeat text-warning me-1"></i>
Next Month Advance Salary
</label>

<input type="number"
step="0.01"
name="next_month_advance"
id="next_month_advance"
value="0"
class="form-control">

</div>


<!-- Previous Balance -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-clock-history text-secondary me-1"></i>
Previous Month Balance
</label>

<input type="text"
id="previous_balance"
class="form-control"
readonly>

</div>


<!-- Already Bought -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-arrow-down-up text-danger me-1"></i>
Already Bought Next Month Advance
</label>

<input type="text"
id="previous_next_month_advance"
class="form-control"
readonly>

</div>


<!-- Balance Preview -->
<div class="col-md-6">

<label class="form-label">
<i class="bi bi-calculator text-success me-1"></i>
Balance (Preview)
</label>

<input type="text"
id="balance_preview"
class="form-control"
readonly>

</div>

</div>


<div class="text-end mt-4">

<button type="submit"
class="btn btn-primary rounded-pill px-4 shadow-sm">

<i class="bi bi-check-circle me-1"></i>
Save Salary

</button>

</div>

</form>

</div>
</div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const salaryInput    = document.getElementById("salary_amount");
    const balancePreview = document.getElementById("balance_preview");

    const staffSelect       = document.getElementById("staff_select");
    const salaryTypeDisplay = document.getElementById("salary_type_display");
    const monthSelect       = document.getElementById("salary_month");
    const yearSelect        = document.getElementById("salary_year");

    const prevMonthSalaryEl = document.getElementById("previous_balance");
    const advanceTokenEl    = document.getElementById("previous_next_month_advance");

    const advanceInput     = document.getElementById("salary_advance");
    const nextMonthAdvance = document.getElementById("next_month_advance");
    const paidInput        = document.getElementById("paid_amount");

    /* -------------------
       CALCULATE BALANCE
    ------------------- */
    function calculateBalance() {
        const currentSalary  = parseFloat(salaryInput.value) || 0;
        const previousSalary = parseFloat(prevMonthSalaryEl.value) || 0;
        const advanceToken   = parseFloat(advanceTokenEl.value) || 0;
        const paidAmount     = parseFloat(paidInput.value) || 0;

        let finalBalance = (currentSalary + previousSalary) - paidAmount - advanceToken;
        if (finalBalance < 0) finalBalance = 0;

        balancePreview.value = finalBalance.toFixed(2);
    }

    /* -------------------
       FETCH PREVIOUS SALARY
    ------------------- */
    function fetchPreviousSalaryData() {
    const staff_id = staffSelect.value;
    const month    = monthSelect.value;
    const year     = yearSelect.value;
    const salary   = salaryInput.value || 0;
    const paid     = paidInput.value || 0;

    if (!staff_id || !month || !year) return;

    fetch(`/get_previous_salary_data/?staff_id=${staff_id}&salary_month=${month}&salary_year=${year}&salary_amount=${salary}&paid_amount=${paid}`)
        .then(r => r.json())
        .then(data => {
            prevMonthSalaryEl.value = data.previous_month_salary ?? "0.00";
            advanceTokenEl.value    = data.advance_token ?? "0.00";
            document.getElementById("previous_balance").value = data.previous_balance ?? "0.00"; // new
            balancePreview.value = data.balance_preview ?? "0.00";
        })
        .catch(err => console.error(err));
}
    /* -------------------
       EVENTS
    ------------------- */
    salaryInput.addEventListener("input", calculateBalance);
    paidInput.addEventListener("input", calculateBalance);
    advanceInput.addEventListener("input", calculateBalance);
    nextMonthAdvance.addEventListener("input", calculateBalance);

    [staffSelect, monthSelect, yearSelect].forEach(el => {
        if (el) el.addEventListener("change", fetchPreviousSalaryData);
    });

    staffSelect.addEventListener("change", function () {
        const selected = this.options[this.selectedIndex];
        salaryTypeDisplay.value = selected.getAttribute("data-salary-type") || "";
        fetchPreviousSalaryData();
    });

    /* -------------------
       TOGGLE ADVANCE FIELDS
    ------------------- */
    window.toggleAdvanceField = function() {
        const dropdown = document.getElementById("needAdvance");
        const field = document.getElementById("advanceField");
        if (!dropdown || !field) return;

        if (dropdown.value === "yes") {
            field.classList.remove("d-none");
            advanceInput.focus();
        } else {
            field.classList.add("d-none");
            advanceInput.value = 0;
            calculateBalance();
        }
    };

    window.toggleNextMonthAdvance = function() {
        const dropdown = document.getElementById("needNextAdvance");
        const field = document.getElementById("nextMonthAdvanceField");
        if (!dropdown || !field) return;

        if (dropdown.value === "yes") {
            field.classList.remove("d-none");
            nextMonthAdvance.focus();
        } else {
            field.classList.add("d-none");
            nextMonthAdvance.value = 0;
            calculateBalance();
        }
    };

    /* -------------------
       INITIAL LOAD
    ------------------- */
    // Trigger fetch if staff/month/year are pre-selected
    fetchPreviousSalaryData();
    calculateBalance();

});
</script>

{% endblock %}
