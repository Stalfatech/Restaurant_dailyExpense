{% extends "base.html" %}
{% load static %}
{% block 'content' %}

<style>
.premium-card{
    border-radius:16px;
}

.form-label{
    font-size:13px;
    font-weight:600;
    color:#495057;
}

.form-control,
.form-select{
    border-radius:10px;
    height:44px;
    font-size:14px;
}

.form-control[readonly]{
    background:#f8f9fa;
}

.btn-primary,
.btn-dark{
    border-radius:50px;
    padding:8px 22px;
    font-size:14px;
}
</style>


<div class="container py-4">

<div class="card premium-card shadow-sm border-0">

<!-- Header -->
<div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">

<div>
<h5 class="mb-0 fw-bold">
<i class="bi bi-pencil-square text-primary me-2"></i>
Edit Salary
</h5>
<small class="text-muted">Update staff salary details</small>
</div>

<a href="{% url 'salary_list' %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
<i class="bi bi-arrow-left"></i> Back
</a>

</div>


<div class="card-body p-4">

<form method="post">
{% csrf_token %}

<div class="row g-4">

<!-- Staff -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-person text-primary me-1"></i>
Staff
</label>

<input type="text" class="form-control" value="{{ salary.staff.name }}" readonly>
</div>


<!-- Salary Period -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-calendar-event text-warning me-1"></i>
Salary Period
</label>

<input type="text"
class="form-control"
value="{{ salary.salary_month }} {{ salary.salary_year }}"
readonly>
</div>


<!-- Salary Amount -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-cash-stack text-success me-1"></i>
Salary Amount
</label>

<input type="number"
step="0.01"
name="salary_amount"
id="salary_amount"
class="form-control"
value="{{ salary.salary_amount }}">
</div>


<!-- Total Advance -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-wallet2 text-danger me-1"></i>
Already Taken Advance
</label>

<input type="text"
id="total_advance"
class="form-control"
value="{{ total_advance }}"
readonly>
</div>


<!-- Add New Advance -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-plus-circle text-danger me-1"></i>
Add New Advance
</label>

<input type="number"
step="0.01"
name="salary_advance"
id="new_advance"
class="form-control"
placeholder="Enter new advance">
</div>


<!-- Already Paid -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-check-circle text-success me-1"></i>
Already Paid
</label>

<input id="already_paid"
type="number"
class="form-control"
value="{{ salary.paid_amount }}"
readonly>
</div>


<!-- Pay Now -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-credit-card text-info me-1"></i>
Pay Now
</label>

<input
id="pay_now"
type="number"
step="0.01"
name="paid_amount"
class="form-control"
placeholder="Enter amount"
min="0">
</div>


<!-- Next Month Advance -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-arrow-right-circle text-warning me-1"></i>
Next Month Advance
</label>

<input type="number"
step="0.01"
name="next_month_advance"
class="form-control"
value="{{ salary.next_month_advance_amount }}">
</div>


<!-- Balance Preview -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-calculator text-success me-1"></i>
Balance (Preview)
</label>

<input type="text"
id="balance_preview"
class="form-control"
readonly>
</div>


<!-- Payment Date -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-calendar-check text-primary me-1"></i>
Payment Date
</label>

<input type="date"
name="payment_date"
class="form-control"
value="{{ salary.payment_date|date:'Y-m-d' }}">
</div>


<!-- Payment Mode -->
<div class="col-md-6">
<label class="form-label">
<i class="bi bi-bank text-dark me-1"></i>
Payment Mode
</label>

<select name="payment_mode" class="form-select">

<option value="">Select</option>

<option value="Cash" {% if salary.payment_mode == 'Cash' %}selected{% endif %}>
Cash
</option>

<option value="Bank" {% if salary.payment_mode == 'Bank' %}selected{% endif %}>
Bank
</option>

</select>
</div>


</div>


<div class="text-end mt-4">

<a href="{% url 'salary_list' %}" class="btn btn-outline-secondary rounded-pill me-2">
<i class="bi bi-arrow-left"></i> Back to List
</a>

<button class="btn btn-dark rounded-pill px-4">
<i class="bi bi-check-circle"></i> Update Salary
</button>

</div>

</form>

</div>
</div>
</div>


<script>
document.addEventListener('DOMContentLoaded', function() {

const salaryInput = document.getElementById("salary_amount");
const alreadyPaidInput = document.getElementById("already_paid");
const payNowInput = document.getElementById("pay_now");
const balancePreview = document.getElementById("balance_preview");

function calculateBalance(){

const salary = parseFloat(salaryInput.value) || 0;
const alreadyPaid = parseFloat(alreadyPaidInput.value) || 0;
const payNow = parseFloat(payNowInput.value) || 0;

let balance = salary - (alreadyPaid + payNow);

if(balance < 0){
balance = 0;
}

balancePreview.value = balance.toFixed(2);

}

payNowInput.addEventListener("input", calculateBalance);
salaryInput.addEventListener("input", calculateBalance);

calculateBalance();

});
</script>

{% endblock %}
