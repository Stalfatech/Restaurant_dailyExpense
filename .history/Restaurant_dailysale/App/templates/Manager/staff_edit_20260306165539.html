{% extends "base.html" %}
{% block content %}

<style>
    .premium-card {
        border-radius: 16px;
        background-color: #ffffff;
    }
    .form-label {
        font-size: 13px;
        font-weight: 600;
        color: #495057;
        margin-bottom: 6px;
    }
    .form-control,
    .form-select {
        border-radius: 10px;
        height: 44px;
        font-size: 14px;
    }
    .btn-primary {
        border-radius: 50px;
        padding: 8px 22px;
        font-size: 14px;
        font-weight: 500;
    }
</style>

<div class="container py-4">

    <div class="card premium-card shadow-sm border-0">

        <!-- Header -->
        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
            <div>
                <h5 class="mb-0 fw-bold">
                    <i class="bi bi-person-check text-primary me-2"></i>
                    Edit Staff
                </h5>
                <small class="text-muted">Update staff member details</small>
            </div>
            <a href="{% url 'staff_list' %}" 
               class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                ← Back
            </a>
        </div>

        <div class="card-body p-4">

            <!-- Django Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm rounded-3">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="row g-4">

                    <!-- Staff ID -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-hash text-secondary me-1"></i> Staff ID *</label>
                        <input type="text" name="staff_id"
                               value="{{ staff.staff_id }}"
                               class="form-control" required>
                    </div>

                    <!-- Name -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-person text-primary me-1"></i> Name *</label>
                        <input type="text" name="name"
                               value="{{ staff.name }}"
                               class="form-control" required>
                    </div>

                    <!-- Gender -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-gender-ambiguous text-info me-1"></i> Gender *</label>
                        <select name="gender" class="form-select" required>
                            <option value="">Select</option>
                            <option value="Male" {% if staff.gender == "Male" %}selected{% endif %}>Male</option>
                            <option value="Female" {% if staff.gender == "Female" %}selected{% endif %}>Female</option>
                            <option value="Other" {% if staff.gender == "Other" %}selected{% endif %}>Other</option>
                        </select>
                    </div>

                    <!-- Role -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-briefcase text-warning me-1"></i> Role *</label>
                        <select name="role" class="form-select" required>
                            <option value="">Select</option>
                            <option value="Chef" {% if staff.role == "Chef" %}selected{% endif %}>Chef</option>
                            <option value="Helper" {% if staff.role == "Helper" %}selected{% endif %}>Helper</option>
                            <option value="Delivery" {% if staff.role == "Delivery" %}selected{% endif %}>Delivery</option>
                        </select>
                    </div>

                    <!-- Contact -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-telephone text-success me-1"></i> Contact *</label>
                        <input type="tel" name="contact"
                               value="{{ form_data.contact|default:staff.contact }}"
                               class="form-control {% if contact_error %}is-invalid{% endif %}"
                               placeholder="+971501234567" required>
                        {% if contact_error %}
                            <div class="invalid-feedback">{{ contact_error }}</div>
                        {% endif %}
                    </div>

                    <!-- DOB -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-calendar-date text-warning me-1"></i> Date of Birth</label>
                        <input type="date" name="dob"
                               value="{{ staff.dob|date:'Y-m-d' }}"
                               class="form-control">
                    </div>

                    <!-- Joining Date -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-calendar-check text-primary me-1"></i> Joining Date *</label>
                        <input type="date" name="joining_date"
                               value="{{ staff.joining_date|date:'Y-m-d' }}"
                               class="form-control" required>
                    </div>

                    <!-- Salary Type -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-cash-coin text-success me-1"></i> Salary Type *</label>
                        <select name="salary_type" class="form-select" required>
                            <option value="Monthly" {% if staff.salary_type == "Monthly" %}selected{% endif %}>Monthly</option>
                            <option value="Daily" {% if staff.salary_type == "Daily" %}selected{% endif %}>Daily</option>
                        </select>
                    </div>

                    <!-- Status -->
                    <div class="col-md-6">
                        <label class="form-label"><i class="bi bi-toggle-on text-primary me-1"></i> Status *</label>
                        <select name="status" class="form-select" required>
                            <option value="Active" {% if staff.status == "Active" %}selected{% endif %}>Active</option>
                            <option value="Inactive" {% if staff.status == "Inactive" %}selected{% endif %}>Inactive</option>
                        </select>
                    </div>

                </div> <!-- END ROW -->

                <!-- Buttons -->
                <div class="d-flex justify-content-end mt-4">
                    <a href="{% url 'staff_list' %}" class="btn btn-outline-secondary rounded-pill px-4 me-2">Cancel</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">
                        <i class="bi bi-save me-1"></i> Update Staff
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
