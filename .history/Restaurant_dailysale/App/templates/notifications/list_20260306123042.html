{% extends "base.html" %}

{% block 'content'%}

<div class="container mt-4">

<h4 class="mb-4">All Notifications</h4>

<div class="card">
<div class="card-body">

<table class="table table-striped">

<thead>
<tr>
<th>#</th>
<th>Message</th>
<th>Type</th>
<th>Time</th>
</tr>
</thead>

<tbody>

{% for n in notifications %}

<tr>
<td>{{ forloop.counter }}</td>

<td>{{ n.message }}</td>

<td>
<span class="badge bg-secondary">
{{ n.tag }}
</span>
</td>

<td>{{ n.created_at|timesince }} ago</td>

</tr>

{% empty %}

<tr>
<td colspan="4" class="text-center text-muted">
No notifications found
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>
</div>

</div>

{% endblock %}
