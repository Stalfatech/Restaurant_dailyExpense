{% extends "base.html" %}
{% block 'content' %}

<style>
    .premium-card {
        border-radius: 16px;
    }

    .form-label {
        font-size: 13px;
        font-weight: 600;
        color: #495057;
        margin-bottom: 6px;
    }

    .form-control,
    .form-select {
        border-radius: 10px;
        height: 44px;
        font-size: 14px;
    }

    .btn-success,
    .btn-secondary {
        border-radius: 50px;
        padding: 8px 22px;
        font-size: 14px;
        font-weight: 500;
    }

    .text-danger {
        font-size: 12px;
    }
</style>

<div class="container py-4">

<div class="card premium-card shadow-sm border-0">

    <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
        <h5 class="mb-0 fw-bold">
            <i class="bi bi-truck text-primary me-2"></i>
            {{ page_title }}
        </h5>
    </div>

    <div class="card-body p-4">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm rounded-3">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label class="form-label">
                    <i class="bi bi-truck text-primary me-1"></i>
                    Platform Name *
                </label>
                {{ form.name }}
                <div class="text-danger">{{ form.name.errors }}</div>
            </div>

            <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-success shadow-sm">
                    <i class="bi bi-check-circle me-1"></i> Save
                </button>

                <a href="{% url 'delivery_platform_list' %}" class="btn btn-secondary shadow-sm">
                    <i class="bi bi-x-circle me-1"></i> Cancel
                </a>
            </div>

        </form>

    </div>
</div>
</div>

{% endblock %}
