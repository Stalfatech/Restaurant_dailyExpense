{% extends "base.html" %}
{% load static %}
{% block 'content' %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow border-0 rounded-4">

                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Update Favicon</h5>
                </div>

                <div class="card-body">

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        {% if profile.favicon %}
                        <div class="text-center mb-3">
                            <img src="{{ profile.favicon.url }}"
                                 width="64"
                                 height="64"
                                 class="border rounded p-1">
                        </div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">New Favicon (PNG only)</label>
                            <input type="file"
                                   name="favicon"
                                   class="form-control"
                                   accept="image/png"
                                   required>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="submit" class="btn btn-warning">
                                Update Favicon
                            </button>

                            <a href="{% url 'view_dashboard_profile' %}"
                               class="btn btn-secondary">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
