{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Login | Daily Sales</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="{% static 'assets/css/bootstrap.min.css' %}" rel="stylesheet">
<link href="{% static 'assets/css/icons.min.css' %}" rel="stylesheet">
<link href="{% static 'assets/css/app.min.css' %}" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body {
    min-height: 100vh;
    background: url("{% static 'assets/images/login-bg.jpg' %}") no-repeat center center fixed;
    background-size: cover;
    font-family: 'Segoe UI', sans-serif;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(15,23,42,0.85), rgba(30,41,59,0.85));
    backdrop-filter: blur(4px);
    z-index: 0;
}

.login-overlay {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(25px);
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 40px 120px rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.15);
    color: #ffffff;
    max-width: 340px;
    width: 100%;
}

.form-control {
    background: #ffffff;
    border: none;
    color: #000000;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12px;
}

.form-control:focus {
    box-shadow: 0 0 20px rgba(59,130,246,0.6);
    outline: none;
}

.form-control::placeholder {
    color: #6b7280;
}

/* Remove Edge default eye */
input::-ms-reveal,
input::-ms-clear {
    display: none;
}

/* Custom Eye Icon */
.password-wrapper {
    position: relative;
}

.toggle-password {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    cursor: pointer;
    color: #6b7280;
    font-size: 16px;
    display: flex;
    align-items: center;
    height: 100%;
}

.toggle-password:hover {
    color: #2563eb;
}
.password-wrapper input {
    padding-right: 40px;   /* create space for eye */
}

.btn-primary {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    border: none;
    border-radius: 10px;
    padding: 9px;
    font-weight: 600;
}

.btn-primary:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(59,130,246,0.7);
}

.alert-danger {
    background: rgba(255, 0, 0, 0.15);
    border: 1px solid rgba(255, 0, 0, 0.4);
    color: #fff;
}
</style>
</head>

<body>

<div class="login-overlay">
<div class="login-card">

    <div class="text-center mb-4">
        <h4>Welcome Back</h4>
        <p class="text-muted">Login to continue</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger text-center">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <!-- Email -->
        <div class="mb-2">
            <label>Email</label>
            <input type="email" name="email"
                   class="form-control"
                   placeholder="example@gmail.com"
                   required>
        </div>

        <!-- Password -->
        <div class="mb-2 password-wrapper">
            <label>Password</label>
            <input type="password"
                   name="password"
                   id="password"
                   class="form-control"
                   placeholder="Enter 8 characters only"
                   minlength="8"
                   maxlength="8"
                   required>

            <span class="toggle-password">
                <i class="fa fa-eye"></i>
            </span>

            <small class="text-muted">
                Password must be exactly 8 characters
            </small>
        </div>

        <div class="mb-3 text-end">
            <a href="{% url 'forgot_password' %}" class="text-primary small">
                Forgot password?
            </a>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Log In <i class="fas fa-sign-in-alt ms-1"></i>
        </button>
    </form>

    <div class="text-center mt-4">
        <p class="text-muted mb-2">
            Don’t have an account?
            <a href="{% url 'register' %}" class="text-primary">Register</a>
        </p>
    </div>

</div>
</div>

<!-- Toggle Script -->
<script>
document.querySelector(".toggle-password").addEventListener("click", function () {
    const passwordInput = document.getElementById("password");
    const icon = this.querySelector("i");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
});
</script>

</body>
</html>
