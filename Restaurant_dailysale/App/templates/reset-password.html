{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #000000, #0f0f0f, #1a1a1a, #0a0a0a);
        background-size: 400% 400%;
        animation: gradientMove 12s ease infinite;
        font-family: 'Arial', sans-serif;
        overflow: hidden;
        position: relative;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .bubble {
        position: absolute;
        bottom: -150px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
        animation: rise 10s infinite linear;
        opacity: 0.3;
        pointer-events: none;
    }

    @keyframes rise {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        50% { opacity: 0.3; }
        100% { transform: translateY(-120vh) scale(1); opacity: 0; }
    }

    .bubble:nth-child(1) { left: 10%; width: 70px; height: 70px; animation-duration: 9s; }
    .bubble:nth-child(2) { left: 30%; width: 110px; height: 110px; animation-duration: 11s; }
    .bubble:nth-child(3) { left: 55%; width: 60px; height: 60px; animation-duration: 8s; }
    .bubble:nth-child(4) { left: 75%; width: 90px; height: 90px; animation-duration: 10s; }
    .bubble:nth-child(5) { left: 90%; width: 60px; height: 60px; animation-duration: 9s; }

    .reset-container {
        position: relative;
        max-width: 340px;
        width: 100%;
        padding: 30px 28px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(25px);
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
        color: #fff;
        z-index: 2;
    }

    .reset-header {
        text-align: center;
        margin-bottom: 20px;
        font-size: 20px;
        font-weight: 600;
    }

    .form-group {
        position: relative;
        margin-bottom: 15px;
    }

    .form-control {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 8px;
        color: #fff;
        padding: 8px 40px 8px 10px;
        font-size: 14px;
    }

    .form-control:focus {
        background: rgba(255,255,255,0.12);
        border-color: #d4af37;
        box-shadow: 0 0 15px rgba(212,175,55,0.4);
        color: #fff;
    }

    .toggle-eye {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #ccc;
        font-size: 16px;
    }

    .btn-primary {
        width: 100%;
        padding: 8px;
        font-weight: 600;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, #b8860b, #d4af37);
        color: #000;
        font-size: 14px;
        transition: 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(212,175,55,0.4);
    }

    small {
        color: #ccc;
        font-size: 12px;
    }

</style>
</head>
<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="reset-container">
    <h2 class="reset-header">Reset Password</h2>

    <form method="POST" id="resetForm">
        {% csrf_token %}

        <!-- New Password -->
        <div class="form-group">
            <input type="password"
                   name="new_password"
                   id="new_password"
                   class="form-control"
                   placeholder="Enter New Password"
                   minlength="8"
                   maxlength="8"
                   required>

            <span class="toggle-eye" onclick="togglePassword('new_password')">👁</span>
        </div>

        <small>Password must be exactly 8 characters</small>

        <!-- Confirm Password -->
        <div class="form-group mt-3">
            <input type="password"
                   name="confirm_password"
                   id="confirm_password"
                   class="form-control"
                   placeholder="Confirm Password"
                   minlength="8"
                   maxlength="8"
                   required>

            <span class="toggle-eye" onclick="togglePassword('confirm_password')">👁</span>
        </div>

        <button type="submit" class="btn btn-primary mt-3">
            Reset Password
        </button>
    </form>
</div>

<script>
    function togglePassword(id) {
        const field = document.getElementById(id);
        field.type = field.type === "password" ? "text" : "password";
    }

    document.getElementById("resetForm").addEventListener("submit", function(e) {
        const password = document.getElementById("new_password").value;
        const confirm = document.getElementById("confirm_password").value;

        if (password.length !== 8) {
            alert("Password must be exactly 8 characters.");
            e.preventDefault();
            return;
        }

        if (password !== confirm) {
            alert("Passwords do not match.");
            e.preventDefault();
        }
    });
</script>

</body>
</html>
